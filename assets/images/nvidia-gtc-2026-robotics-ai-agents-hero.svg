<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#76b900"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bgGrad)"/>
  <g opacity="0.1">
    <circle cx="200" cy="200" r="300" fill="#76b900"/>
    <circle cx="1000" cy="500" r="250" fill="#00d4aa"/>
  </g>
  <text x="600" y="280" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="800" fill="url(#accentGrad)" text-anchor="middle" filter="url(#glow)">NVIDIA GTC 2026</text>
  <text x="600" y="360" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="42" font-weight="300" fill="#ffffff" text-anchor="middle" opacity="0.9">Robotics &amp; AI Agents</text>
  <g transform="translate(600, 480)">
    <rect x="-150" y="-40" width="300" height="80" rx="40" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>
    <text x="0" y="10" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="600" fill="#76b900" text-anchor="middle">NemoClaw • Vera Rubin • Disney • Uber</text>
  </g>
  <text x="600" y="620" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#606070" text-anchor="middle">Placeholder - AI Image Generation Quota Exceeded</text>
</svg>